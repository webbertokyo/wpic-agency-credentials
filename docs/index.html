<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WPIC Agency Credentials 2026</title>
<meta name="description" content="WPIC Agency Credentials 2026 - Driving market growth across Asia.">
<meta name="robots" content="noindex">
<!-- Google Analytics (GA4) -->

<style>
  :root{
    --green:#0f5c3f;
    --green-dark:#0a3f2b;
    --cream:#f5f2ea;
    --ink:#1c1c1c;
    --muted:#5f6b64;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--cream);
    line-height:1.5;
    display:flex;
    flex-direction:column;
    min-height:100%;
  }
  header{
    background:var(--green);
    color:#fff;
    padding:28px 24px;
  }
  .wrap{max-width:980px;margin:0 auto;width:100%}
  header .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:.14em;font-size:15px}
  .tag{font-size:13px;opacity:.85}
  main{flex:1;padding:32px 24px}
  h1{font-size:26px;font-weight:700;color:var(--green-dark);margin-bottom:6px}
  .sub{color:var(--muted);margin-bottom:22px;font-size:15px}
  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:26px}
  .btn{
    display:inline-block;
    padding:13px 22px;
    border-radius:8px;
    font-weight:600;
    font-size:15px;
    text-decoration:none;
    border:1px solid transparent;
    cursor:pointer;
  }
  /* Green button -> white text */
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:hover{background:var(--green-dark)}
  /* Cream button -> green text */
  .btn-secondary{background:#fff;color:var(--green);border-color:var(--green)}
  .btn-secondary:hover{background:#eef4f0}
  .viewer{
    width:100%;
    height:78vh;
    min-height:520px;
    border:1px solid #dcd7cc;
    border-radius:10px;
    background:#fff;
    overflow:hidden;
  }
  .viewer object,.viewer iframe{width:100%;height:100%;border:0}
  .fallback{padding:24px;text-align:center;color:var(--muted)}
  footer{
    background:var(--green-dark);
    color:#cfe0d7;
    padding:18px 24px;
    font-size:13px;
    text-align:center;
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">WPIC</div>
    <div class="tag">Driving market growth across Asia</div>
  </div>
</header>
<main>
  <div class="wrap">
    <h1>Agency Credentials 2026</h1>
    <p class="sub">WPIC helps global brands enter, scale, and grow across APAC's most complex digital markets.</p>
    <div class="actions">
      <a class="btn btn-primary" href="WPIC_Agency_Credentials_2026.pdf" download>Download PDF</a>
      <a class="btn btn-secondary" href="WPIC_Agency_Credentials_2026.pdf" target="_blank" rel="noopener">Open fullscreen</a>
    </div>
    <div class="viewer">
      <object data="WPIC_Agency_Credentials_2026.pdf#view=FitH" type="application/pdf">
        <div class="fallback">
          Your browser cannot display the PDF inline.
          <br><br>
          <a class="btn btn-primary" href="WPIC_Agency_Credentials_2026.pdf">Download the deck</a>
        </div>
      </object>
    </div>
  </div>
</main>
<footer>
  <div class="wrap">WPIC &middot; Global offices across Asia, North America, Europe, and Australia</div>
</footer>
</body>
</html>
